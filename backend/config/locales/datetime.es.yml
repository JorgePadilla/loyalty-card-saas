es:
  date:
    formats:
      default: "%-d/%m/%Y"
      medium: "%-d %b %Y"
      long: "%-d de %B de %Y"
      short_md: "%-d %b"
    month_names:
      - ~
      - enero
      - febrero
      - marzo
      - abril
      - mayo
      - junio
      - julio
      - agosto
      - septiembre
      - octubre
      - noviembre
      - diciembre
    abbr_month_names:
      - ~
      - ene
      - feb
      - mar
      - abr
      - may
      - jun
      - jul
      - ago
      - sep
      - oct
      - nov
      - dic
    day_names:
      - domingo
      - lunes
      - martes
      - miércoles
      - jueves
      - viernes
      - sábado
    abbr_day_names:
      - dom
      - lun
      - mar
      - mié
      - jue
      - vie
      - sáb
  time:
    formats:
      default: "%-d de %B de %Y, %H:%M"
      long_datetime: "%-d de %B de %Y a las %H:%M"
      visit: "%-d %b %Y, %H:%M"
    am: "a. m."
    pm: "p. m."
  datetime:
    distance_in_words:
      half_a_minute: medio minuto
      less_than_x_seconds:
        one: menos de 1 segundo
        other: menos de %{count} segundos
      x_seconds:
        one: 1 segundo
        other: "%{count} segundos"
      less_than_x_minutes:
        one: menos de 1 minuto
        other: menos de %{count} minutos
      x_minutes:
        one: 1 minuto
        other: "%{count} minutos"
      about_x_hours:
        one: alrededor de 1 hora
        other: alrededor de %{count} horas
      x_days:
        one: 1 día
        other: "%{count} días"
      about_x_months:
        one: alrededor de 1 mes
        other: alrededor de %{count} meses
      x_months:
        one: 1 mes
        other: "%{count} meses"
      about_x_years:
        one: alrededor de 1 año
        other: alrededor de %{count} años
      over_x_years:
        one: más de 1 año
        other: más de %{count} años
      almost_x_years:
        one: casi 1 año
        other: casi %{count} años
