default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: loyalty_saas_development

test:
  <<: *default
  database: loyalty_saas_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    database: loyalty_saas_production
    username: loyalty_saas
    password: <%= ENV["LOYALTY_SAAS_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    database: loyalty_saas_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    database: loyalty_saas_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    database: loyalty_saas_production_cable
    migrations_paths: db/cable_migrate
